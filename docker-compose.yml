version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: school_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: school
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: school_express_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password123@db:5432/school
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
